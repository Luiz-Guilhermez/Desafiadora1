<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>to-do list</title>
</head>
<body>
    <div>
        <div>
            <label>Tarefa</label>
            <input type="text" id="tarefa">
        </div>
        <div>
            <label>Horas</label>
            <input type="number" id="horas">
        </div>
        <div>
            <label>Valor</label>
            <input type="number" id="valor" placeholder="Valor por Hora">
        </div>
        <select id="urgencia">
            <option value="0">Sem Urgencia</option>
            <option value="0.2">Urgencia</option>
            <option value="0.5">Muita Urgencia</option>
        </select>
        <button onclick="Tarefa()">Adicionar</button>
    </div>
    <div>
        <div>
            <h1>Sem Urgencia</h1>
            <ul id="lista-normal"></ul>
        </div>
        <div>
            <h1>Urgente</h1>
            <ul id="lista-urgente"></ul>
        </div>
        <div>
            <h1>Muito Urgente</h1>
            <ul id="lista-muito"></ul>
        </div>
    </div>
    <button onclick="gerarOrcamento()">Gerar Orçamento</button>
    <div id="orcamento" style="display: none;">
        <h2>Orçamento</h2>
        <ul id="tarefas"></ul>
        <p class="total">Valor Total</p>
        <h2>R$ 0.00</h2>
        <p>Taxa de Imposto: 30%</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
